<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Dark Saga — Card Depth (demo v2)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===== DEMO v2: раскрытие истории существа (story + несколько фото) =====
   1 Раскрытие на всю ширину · 2 Полный экран с галереей · 3 Шторка снизу
   Часть фото — заглушки из имеющихся ассетов, это про механику.            */
:root{
  --bg:#181614;--bg2:#201e1b;--surf:#282420;--bone:#dad4c8;--dim:#908a7c;--faint:#5c5750;
  --rust:#8b5233;--rust2:#a66244;--moss2:#7a8f5e;--line:rgba(218,212,200,.08);--line2:rgba(218,212,200,.12);
  --sans:'Bricolage Grotesque',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--bone);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}

.head{padding:22px 18px 6px;max-width:900px;margin:0 auto}
.head .k{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--rust2);margin-bottom:8px}
.head h1{font-weight:800;font-size:clamp(22px,5vw,32px);letter-spacing:-.02em;line-height:1.02}
.head p{font-family:var(--mono);font-size:11.5px;color:var(--dim);line-height:1.6;margin-top:10px}

.tabs{position:sticky;top:0;z-index:30;background:rgba(24,22,20,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line2);padding:10px 12px;display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex:0 0 auto;font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--dim);border:1px solid var(--line2);padding:9px 13px;cursor:pointer;white-space:nowrap;background:none;transition:.2s}
.tab.on{color:#18161a;background:var(--bone);border-color:var(--bone);font-weight:600}
.hint{max-width:900px;margin:14px auto 0;padding:0 18px;font-family:var(--mono);font-size:11px;color:var(--faint);line-height:1.6;min-height:30px}
.hint b{color:var(--rust2)}

.grid{max-width:900px;margin:14px auto 80px;padding:0 14px;display:grid;grid-template-columns:repeat(2,1fr);gap:24px 16px}
@media(min-width:680px){.grid{grid-template-columns:repeat(3,1fr)}}

.card{cursor:pointer}
.card .ph{position:relative;overflow:hidden;background:var(--surf)}
.card .ph>img{width:100%;aspect-ratio:4/5;object-fit:cover;filter:grayscale(.4) saturate(.8) brightness(.92) contrast(1.08);transition:filter .5s,transform .8s cubic-bezier(.2,.7,.2,1)}
.card:hover .ph>img{filter:none;transform:scale(1.03)}
.card.open .ph>img{filter:none}
.tag-st{position:absolute;top:0;left:0;font-family:var(--mono);font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;padding:5px 8px;background:rgba(10,9,7,.66);backdrop-filter:blur(3px);color:var(--dim);display:flex;align-items:center;gap:5px;z-index:2}
.tag-st .p{width:5px;height:5px;border-radius:50%;background:var(--faint)}
.tag-st.av{color:var(--bone)}.tag-st.av .p{background:var(--moss2);box-shadow:0 0 6px rgba(122,143,94,.55)}
.card .more{position:absolute;right:8px;bottom:8px;z-index:2;font-family:var(--mono);font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--bone);background:rgba(10,9,7,.6);backdrop-filter:blur(3px);padding:4px 7px}
.card .cap{padding-top:12px}
.card .nm{font-weight:600;font-size:17px;line-height:1.05;letter-spacing:-.01em}
.card .mood{font-family:var(--mono);font-size:11px;color:var(--dim);line-height:1.45;margin-top:4px}
.card.open{outline:1px solid var(--line2)}

/* ===== generic gallery (main + thumbs) ===== */
.g-main{position:relative;background:#0d0c0b;overflow:hidden}
.g-main img{width:100%;height:100%;object-fit:cover;filter:contrast(1.04)}
.g-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:3;width:38px;height:38px;border:none;border-radius:50%;background:rgba(10,9,7,.5);backdrop-filter:blur(4px);color:var(--bone);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.g-arrow.prev{left:10px}.g-arrow.next{right:10px}
.g-count{position:absolute;top:10px;right:10px;z-index:3;font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--bone);background:rgba(10,9,7,.55);backdrop-filter:blur(3px);padding:4px 8px}
.g-thumbs{display:flex;gap:8px;padding:10px 0 0;overflow-x:auto;scrollbar-width:none}
.g-thumbs::-webkit-scrollbar{display:none}
.g-thumbs img{flex:0 0 56px;width:56px;height:70px;object-fit:cover;cursor:pointer;filter:grayscale(.5) brightness(.7);transition:.25s;border:1px solid transparent}
.g-thumbs img.on{filter:none;border-color:var(--rust2)}

/* ===== mode 1: full-width expand row ===== */
.detail{grid-column:1/-1;background:var(--bg2);border:1px solid var(--line2);position:relative;
  display:grid;grid-template-columns:1.05fr 1fr;gap:0;animation:dpop .38s cubic-bezier(.2,.7,.2,1)}
@keyframes dpop{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
.detail .g-main{aspect-ratio:1}
.detail .g-thumbs{padding:12px}
.detail .d-info{padding:28px 30px 30px;display:flex;flex-direction:column}
.d-kick{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--rust2);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.d-kick .p{width:5px;height:5px;border-radius:50%;background:var(--moss2)}
.d-nm{font-weight:800;font-size:clamp(28px,3vw,40px);letter-spacing:-.02em;line-height:1;margin-bottom:16px}
.d-story{font-family:var(--mono);font-size:12.5px;color:var(--dim);line-height:1.85}
.d-cta{align-self:flex-start;display:inline-flex;align-items:center;gap:8px;margin-top:24px;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#18161a;background:var(--bone);padding:12px 20px;transition:.2s}
.d-cta:hover{background:var(--rust2)}
.d-x{position:absolute;top:10px;right:10px;z-index:4;width:34px;height:34px;border:none;border-radius:50%;background:rgba(10,9,7,.5);backdrop-filter:blur(4px);color:var(--bone);font-size:15px;cursor:pointer}
@media(max-width:640px){.detail{grid-template-columns:1fr}.detail .g-main{aspect-ratio:4/5}.detail .d-info{padding:20px}}

/* ===== overlays (fullscreen + sheet) ===== */
.ov{position:fixed;inset:0;z-index:100;display:none}
.ov.show{display:block}
.ov-back{position:absolute;inset:0;background:rgba(8,7,6,.82);backdrop-filter:blur(4px)}
.ov-x{position:absolute;top:calc(14px + env(safe-area-inset-top));right:14px;z-index:8;width:40px;height:40px;border:none;border-radius:50%;background:rgba(10,9,7,.55);color:var(--bone);font-size:18px;cursor:pointer;backdrop-filter:blur(4px)}

/* mode 2: fullscreen gallery (contained photo + story room) */
.fs .panel{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;max-width:760px;margin:0 auto;padding:0 14px}
.fs .fs-stage{flex:1 1 auto;min-height:0;display:flex;align-items:center;justify-content:center;padding-top:calc(56px + env(safe-area-inset-top))}
.fs .g-main{width:100%;height:100%;border-radius:4px}
.fs .g-main img{object-fit:contain}
.fs .g-thumbs{justify-content:center;padding:12px 0 4px;flex:0 0 auto}
.fs .fs-meta{flex:0 0 auto;padding:6px 4px calc(22px + env(safe-area-inset-bottom));max-height:38vh;overflow-y:auto}
.fs-kick{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--rust2);margin-bottom:8px}
.fs-nm{font-weight:800;font-size:26px;letter-spacing:-.02em;line-height:1}
.fs-story{font-family:var(--mono);font-size:12px;color:#cfc9bd;line-height:1.75;margin-top:10px}
.fs-cta{display:inline-flex;align-items:center;gap:8px;margin-top:16px;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#18161a;background:var(--bone);padding:11px 18px}

/* mode 3: bottom sheet */
.sheet .panel{position:absolute;left:0;right:0;bottom:0;z-index:3;max-height:92vh;background:var(--bg);border-top-left-radius:18px;border-top-right-radius:18px;border-top:1px solid var(--line2);transform:translateY(100%);transition:transform .42s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;overflow:hidden;max-width:560px;margin:0 auto}
.sheet.show .panel{transform:none}
.sh-handle{padding:10px 0 6px;display:flex;justify-content:center;flex:none;cursor:grab}
.sh-handle::before{content:"";width:38px;height:4px;border-radius:3px;background:var(--line2)}
.sh-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 calc(22px + env(safe-area-inset-bottom))}
.sheet .g-main{aspect-ratio:1}
.sheet .g-thumbs{padding:10px 18px 0}
.sh-body{padding:14px 20px 4px}
.sh-kick{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--rust2);margin-bottom:8px}
.sh-nm{font-weight:800;font-size:26px;letter-spacing:-.02em;line-height:1}
.sh-story{font-family:var(--mono);font-size:12px;color:var(--dim);line-height:1.8;margin-top:12px}
.sh-cta{display:inline-flex;align-items:center;gap:8px;margin:18px 0 4px;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#18161a;background:var(--bone);padding:12px 18px}
</style>
</head>
<body>

<div class="head">
  <div class="k">Demo v2 · раскрытие истории</div>
  <h1>Расширенный текст + переключение фото</h1>
  <p>Переключай режим сверху и тапай по карточке. Расширенный текст и галерея фото есть во всех трёх. Часть фото — заглушки из имеющихся ассетов.</p>
</div>

<div class="tabs" id="tabs">
  <button class="tab on" data-m="expand">1 · Раскрытие на всю ширину</button>
  <button class="tab" data-m="fs">2 · Полный экран + галерея</button>
  <button class="tab" data-m="sheet">3 · Шторка снизу</button>
</div>
<div class="hint" id="hint"></div>

<div class="grid" id="grid"></div>

<!-- FULLSCREEN GALLERY -->
<div class="ov fs" id="ovFs">
  <div class="ov-back" data-close></div>
  <button class="ov-x" data-close>✕</button>
  <div class="panel">
    <div class="fs-stage">
      <div class="g-main">
        <span class="g-count"></span>
        <button class="g-arrow prev" data-dir="-1">‹</button>
        <button class="g-arrow next" data-dir="1">›</button>
        <img src="" alt="">
      </div>
    </div>
    <div class="g-thumbs"></div>
    <div class="fs-meta">
      <div class="fs-kick"></div>
      <div class="fs-nm"></div>
      <div class="fs-story"></div>
      <a class="fs-cta" href="https://www.etsy.com/shop/DarkSagaArt" target="_blank" rel="noopener">Adopt on Etsy ↗</a>
    </div>
  </div>
</div>

<!-- BOTTOM SHEET -->
<div class="ov sheet" id="ovSheet">
  <div class="ov-back" data-close></div>
  <div class="panel" id="shPanel">
    <div class="sh-handle" data-close></div>
    <div class="sh-scroll">
      <div class="g-main">
        <span class="g-count"></span>
        <button class="g-arrow prev" data-dir="-1">‹</button>
        <button class="g-arrow next" data-dir="1">›</button>
        <img src="" alt="">
      </div>
      <div class="g-thumbs"></div>
      <div class="sh-body">
        <div class="sh-kick"></div>
        <div class="sh-nm"></div>
        <div class="sh-story"></div>
        <a class="sh-cta" href="https://www.etsy.com/shop/DarkSagaArt" target="_blank" rel="noopener">Full listing on Etsy ↗</a>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  var A='../assets/';
  var data=[
    {name:'Vesper',series:'Tea Spirits',avail:0,mood:'Calm, brooding, prefers night.',
      story:'Vesper keeps the late hours — the patron spirit of the last cup before bed. Pour warm tea over him and the matte glaze drinks it in, darkening like wet slate, then slowly fading back as he dries. He was carved from a single block of dark stoneware and fired three times to reach this bruised, stormy colour. He is quiet company, the kind that notices everything and says nothing. No mold, no copy — this firing will never happen the same way twice.',
      photos:[A+'tea-pets/tea-pet-03.jpg',A+'tea-pets/tea-pet-03-tall.jpg',A+'tea-pets/tea-pet-02.jpg']},
    {name:'Iron Harlequin',series:'Bastards of the Fall',avail:1,mood:'Echo of the Throne.',
      story:'Half jester, half blade. The Iron Harlequin once guarded a queen who no longer rules, and nobody has had the heart to tell him. He still stands his post — bells silent, grin fixed — waiting for a court that has turned to dust. Built by hand over a wire armature in clay and aged brass, dressed in salvaged antique lace and hand-dyed silk. Every joint is posable; every scuff was placed on purpose. One of one.',
      photos:[A+'bastards/bastards-01.jpg',A+'bastards/bastards-03.jpg',A+'urban/urban-04.jpg']},
    {name:'Queen of Ashes',series:'Bastards of the Fall',avail:1,mood:'Traded lace for steel.',
      story:'She burned her own court to stay warm through a long winter and called it strategy. What remains is regal, a little cruel, and entirely unbothered. Her gown is stitched from charred lace and wire, and oxidised iron powder is rubbed into every seam so she rusts a little more each year. Face, hands and crown were modelled by hand without molds. She is looking for someone who appreciates a sharp edge.',
      photos:[A+'bastards/bastards-02.jpg',A+'bastards/bastards-01.jpg',A+'bastards/bastards-03.jpg']},
    {name:'Master of the Forest',series:'Urban Misfits',avail:1,mood:"Old god of the city's routes.",
      story:'An ancient forest god who took one wrong turn through a subway tunnel and ended up presiding over a city bus depot. He has decided this is fine. Moss still creeps over anything he sits on too long, and the pigeons treat him as minor royalty. Made from clay, needle-felted wool and small pieces of found city debris. Slightly broken, slightly holy.',
      photos:[A+'urban/urban-02.jpg',A+'urban/urban-01.jpg',A+'urban/urban-05.jpg']},
    {name:'Skyline Nomad',series:'Spores',avail:1,mood:'Rooftop spirit chasing wind.',
      story:'Pocket-sized and permanently restless, the Skyline Nomad rides drafts between chimney pots and refuses, on principle, to come down. He travels light: a scarf, a bad attitude, and an excellent sense of balance. Small enough to live in a coat pocket, with a wire frame so he can perch anywhere. Maximal personality in minimal form.',
      photos:[A+'spores/spores-01.jpg',A+'spores/spores-02.jpg']},
    {name:'Kitsune',series:'Tea Spirits',avail:0,mood:'Cunning, mischievous, restless.',
      story:'Trouble with a tail. Kitsune will quietly steal the warmth from your cup and then act personally offended that the tea went cold. Hand-built in pale ceramic with a sly grin that seems to shift depending on the light and your mood. A trickster spirit for people who like their companions just a little untrustworthy.',
      photos:[A+'tea-pets/tea-pet-09.jpg',A+'tea-pets/tea-pet-09-tall.jpg',A+'tea-pets/tea-pet-13.jpg']}
  ];

  var HINTS={
    expand:'<b>Раскрытие на всю ширину.</b> Тап по карточке → панель раскрывается во всю ширину прямо под рядом: слева галерея (стрелки/миниатюры), справа расширенный текст. Тап ещё раз или ✕ — свернуть.',
    fs:'<b>Полный экран + галерея.</b> Тап → полноэкранно, но фото НЕ обрезано (целиком). Снизу миниатюры/стрелки переключают фото, под ними расширенный текст. ✕ / фон — закрыть.',
    sheet:'<b>Шторка снизу.</b> Тап → панель выезжает снизу: галерея фото + расширенный текст листается. Тап по фону / ручке — закрыть.'
  };

  var grid=document.getElementById('grid'),hint=document.getElementById('hint');
  var mode='expand', openIdx=-1;

  function stBadge(c){return '<span class="tag-st '+(c.avail?'av':'')+'"><span class="p"></span>'+(c.avail?'Available':'Adopted')+'</span>';}

  function renderGrid(){
    hint.innerHTML=HINTS[mode];
    openIdx=-1;
    grid.innerHTML=data.map(function(c,i){
      return '<div class="card" data-i="'+i+'">'+
        '<div class="ph">'+stBadge(c)+'<span class="more">'+c.photos.length+' photos · story</span><img loading="lazy" src="'+c.photos[0]+'" alt=""></div>'+
        '<div class="cap"><div class="nm">'+c.name+'</div><div class="mood">'+c.mood+'</div></div>'+
      '</div>';
    }).join('');
  }

  /* ---- gallery wiring (works for any root with .g-main img + .g-thumbs) ---- */
  function buildGallery(root,c){
    var main=root.querySelector('.g-main img');
    var count=root.querySelector('.g-count');
    var thumbs=root.querySelector('.g-thumbs');
    var idx=0;
    thumbs.innerHTML=c.photos.map(function(p,k){return '<img src="'+p+'" data-k="'+k+'" class="'+(k===0?'on':'')+'" alt="">';}).join('');
    function show(k){
      idx=(k+c.photos.length)%c.photos.length;
      main.src=c.photos[idx];
      if(count)count.textContent=(idx+1)+' / '+c.photos.length;
      thumbs.querySelectorAll('img').forEach(function(t){t.classList.toggle('on',+t.getAttribute('data-k')===idx);});
    }
    thumbs.onclick=function(e){var t=e.target.closest('img');if(t)show(+t.getAttribute('data-k'));};
    var ar=root.querySelectorAll('.g-arrow');
    ar.forEach(function(b){b.onclick=function(ev){ev.stopPropagation();show(idx+ +b.getAttribute('data-dir'));};});
    main.onclick=function(){show(idx+1);};
    show(0);
  }

  /* ---- mode 1: full-width expand ---- */
  function clearDetail(){var d=grid.querySelector('.detail');if(d)d.remove();
    var o=grid.querySelector('.card.open');if(o)o.classList.remove('open');openIdx=-1;}
  function rowEndCard(card){
    var top=card.offsetTop,last=card;
    grid.querySelectorAll('.card').forEach(function(c){if(Math.abs(c.offsetTop-top)<6)last=c;});
    return last;
  }
  function openExpand(i,card){
    if(openIdx===i){clearDetail();return;}
    clearDetail();
    var c=data[i];card.classList.add('open');openIdx=i;
    var d=document.createElement('div');d.className='detail';
    d.innerHTML='<button class="d-x">✕</button>'+
      '<div class="g-side"><div class="g-main"><span class="g-count"></span><button class="g-arrow prev" data-dir="-1">‹</button><button class="g-arrow next" data-dir="1">›</button><img src="" alt=""></div><div class="g-thumbs"></div></div>'+
      '<div class="d-info"><div class="d-kick">'+(c.avail?'<span class="p"></span>Available · ':'')+c.series+'</div><div class="d-nm">'+c.name+'</div><div class="d-story">'+c.story+'</div><a class="d-cta" href="https://www.etsy.com/shop/DarkSagaArt" target="_blank" rel="noopener">Adopt on Etsy ↗</a></div>';
    var end=rowEndCard(card);
    end.after(d);
    buildGallery(d,c);
    d.querySelector('.d-x').onclick=function(){clearDetail();};
    d.scrollIntoView({behavior:'smooth',block:'nearest'});
  }

  /* ---- overlays ---- */
  var ovFs=document.getElementById('ovFs'),ovSheet=document.getElementById('ovSheet');
  function openFs(i){var c=data[i];
    ovFs.querySelector('.fs-kick').textContent=c.series;
    ovFs.querySelector('.fs-nm').textContent=c.name;
    ovFs.querySelector('.fs-story').textContent=c.story;
    buildGallery(ovFs,c);ovFs.classList.add('show');}
  function openSheet(i){var c=data[i];
    ovSheet.querySelector('.sh-kick').textContent=c.series;
    ovSheet.querySelector('.sh-nm').textContent=c.name;
    ovSheet.querySelector('.sh-story').textContent=c.story;
    buildGallery(ovSheet,c);ovSheet.classList.add('show');}
  function closeOv(){ovFs.classList.remove('show');ovSheet.classList.remove('show');}

  /* ---- events ---- */
  document.getElementById('tabs').addEventListener('click',function(e){
    var t=e.target.closest('.tab');if(!t)return;
    document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on');});
    t.classList.add('on');mode=t.getAttribute('data-m');renderGrid();
  });
  grid.addEventListener('click',function(e){
    var card=e.target.closest('.card');if(!card||card.classList.contains('detail'))return;
    var i=+card.getAttribute('data-i');
    if(mode==='expand')openExpand(i,card);
    else if(mode==='fs')openFs(i);
    else openSheet(i);
  });
  document.querySelectorAll('[data-close]').forEach(function(el){el.addEventListener('click',closeOv);});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeOv();});
  function swipeDown(el){var y0=null;
    el.addEventListener('touchstart',function(e){y0=e.touches[0].clientY;},{passive:true});
    el.addEventListener('touchend',function(e){if(y0===null)return;var dy=e.changedTouches[0].clientY-y0;y0=null;if(dy>70)closeOv();},{passive:true});}
  swipeDown(document.getElementById('shPanel').querySelector('.sh-handle'));

  renderGrid();
})();
</script>
</body>
</html>
