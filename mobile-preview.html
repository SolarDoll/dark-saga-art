<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Saga Art | Mobile Preview (390px)</title>
    <style>
        body {
            background-color: #0d0f12;
            color: #f1f5f9;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .header-info {
            text-align: center;
            margin-bottom: 1.5rem;
            padding: 0 1rem;
            z-index: 10;
        }

        .header-info h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.02em;
        }

        .header-info p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin: 0;
            font-weight: 300;
        }

        .device-container {
            width: 390px;
            height: 800px;
            background-color: #000000;
            border: 12px solid #1e293b;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            z-index: 5;
        }

        /* Top Notch Speaker Simulation */
        .device-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 25px;
            background-color: #1e293b;
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .device-notch::before {
            content: '';
            width: 40px;
            height: 4px;
            background-color: #0f172a;
            border-radius: 2px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 28px;
            background-color: #0a0b0d;
        }

        .nav-row { display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: center; margin-top: 0.9rem; }
        .nav-row button {
            background-color: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #f1f5f9;
            padding: 0.5rem 0.9rem;
            border-radius: 9px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .nav-row button:hover { background-color: rgba(255, 255, 255, 0.09); }
        .nav-row button.on { background-color: #8b5233; border-color: #8b5233; }
        .nav-row .sep { width: 1px; background: rgba(255,255,255,.12); margin: 0 0.3rem; }
        .hint { color:#64748b; font-size:0.75rem; margin-top:0.8rem; max-width:360px; text-align:center; line-height:1.5 }
    </style>
</head>
<body>

    <div class="header-info">
        <h1>Dark Saga Art — Mobile Preview</h1>
        <p>Smartphone view simulation (screen width 390px)</p>
        <div class="nav-row" id="navRow">
            <button data-url="/" class="on">Home</button>
            <button data-url="/tea-pets/">Tea Spirits</button>
            <button data-url="/art-dolls/">Art Dolls</button>
            <button data-url="/drop/?drop=live">Drop (live)</button>
            <span class="sep"></span>
            <button id="refresh">↻ Refresh</button>
        </div>
    </div>

    <div class="device-container">
        <div class="device-notch"></div>
        <iframe src="/" id="preview-frame" title="Mobile Preview"></iframe>
    </div>

    <p class="hint">Открывать через локальный сервер (http://localhost:8055/mobile-preview.html), не через file:// — иначе пути к ассетам и страницам не работают.</p>

    <script>
      var frame = document.getElementById('preview-frame');
      document.getElementById('navRow').addEventListener('click', function(e){
        var btn = e.target.closest('button'); if(!btn) return;
        if(btn.id === 'refresh'){ frame.src = frame.src; return; }
        var url = btn.getAttribute('data-url'); if(!url) return;
        frame.src = url;
        [].forEach.call(document.querySelectorAll('#navRow button[data-url]'), function(b){ b.classList.toggle('on', b === btn); });
      });
    </script>

</body>
</html>
