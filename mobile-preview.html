<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Saga Art | Mobile Preview (390px)</title>
    <style>
        body {
            background-color: #0d0f12;
            color: #f1f5f9;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .header-info {
            text-align: center;
            margin-bottom: 1.5rem;
            padding: 0 1rem;
            z-index: 10;
        }

        .header-info h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.02em;
        }

        .header-info p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin: 0;
            font-weight: 300;
        }

        .device-container {
            width: 390px;
            height: 800px;
            background-color: #000000;
            border: 12px solid #1e293b;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            z-index: 5;
        }

        /* Top Notch Speaker Simulation */
        .device-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 25px;
            background-color: #1e293b;
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .device-notch::before {
            content: '';
            width: 40px;
            height: 4px;
            background-color: #0f172a;
            border-radius: 2px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 28px;
            background-color: #0a0b0d;
        }

        .refresh-btn {
            margin-top: 1.5rem;
            background-color: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #f1f5f9;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .refresh-btn:hover {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>

    <div class="header-info">
        <h1>Dark Saga Art Mobile Version</h1>
        <p>Smartphone view simulation (screen width 390px)</p>
    </div>

    <div class="device-container">
        <div class="device-notch"></div>
        <iframe src="index.html" id="preview-frame" title="Mobile Preview"></iframe>
    </div>

    <button class="refresh-btn" onclick="document.getElementById('preview-frame').src += ''">Refresh Frame</button>

</body>
</html>
